name: Refresh Financial Data

on:
  schedule:
    # Runs at 2:30 PM UTC (9:30 AM ET) on weekdays — shortly after US market open
    - cron: "30 14 * * 1-5"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch financial data (Yahoo Finance + FRED + Frankfurter)
        run: node scripts/fetch-data.js

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh financial data [skip ci]"
            git push
          fi
